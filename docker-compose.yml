version: '3.9'

services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: safeguard_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7.2-alpine
    ports:
      - '6379:6379'

  backend:
    build: ./backend
    command: sh -c "python manage.py migrate && gunicorn safeguard_ai.wsgi:application --bind 0.0.0.0:8000 --workers 4 --threads 4"
    env_file:
      - ./backend/.env.example
    volumes:
      - ./backend:/app
    ports:
      - '8000:8000'
    depends_on:
      - db
      - redis

  celery-worker:
    build: ./backend
    command: celery -A safeguard_ai worker -l info --concurrency=4
    env_file:
      - ./backend/.env.example
    volumes:
      - ./backend:/app
    depends_on:
      - backend
      - redis

  celery-beat:
    build: ./backend
    command: celery -A safeguard_ai beat -l info
    env_file:
      - ./backend/.env.example
    volumes:
      - ./backend:/app
    depends_on:
      - backend
      - redis

  frontend:
    build: ./frontend
    command: npm run dev
    env_file:
      - ./frontend/.env.example
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - '3000:3000'
    depends_on:
      - backend

volumes:
  postgres_data:
